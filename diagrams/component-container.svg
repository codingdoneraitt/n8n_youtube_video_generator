<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Component and container map</title>
  <desc id="desc">Docker containers, host-mounted files, external Together AI API, and each component responsibility for the n8n practice exam generator.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow-blue" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#38BDF8"/>
    </marker>
    <marker id="arrow-green" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#22C55E"/>
    </marker>
    <marker id="arrow-amber" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#F59E0B"/>
    </marker>
    <marker id="arrow-sky" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#60A5FA"/>
    </marker>
    <style>
      .title{font:700 34px Arial, sans-serif;fill:#F8FAFC}
      .subtitle{font:400 18px Arial, sans-serif;fill:#94A3B8}
      .boundary{fill:#0F172A;stroke:#475569;stroke-width:2;stroke-dasharray:10 8}
      .host{fill:#111827;stroke:#F59E0B;stroke-width:2;stroke-dasharray:10 8}
      .card-title{font:700 22px Arial, sans-serif}
      .card-text{font:400 17px Arial, sans-serif}
      .label{font:700 15px Arial, sans-serif}
      .mono{font:400 15px Arial, sans-serif}
    </style>
  </defs>
  <rect width="1600" height="980" fill="#08111F"/>
  <text x="80" y="96" class="title">Component / Container Map</text>
  <text x="82" y="132" class="subtitle">What runs in Docker, what lives on the host, and which part owns each responsibility.</text>
  <rect x="250" y="185" width="1040" height="540" rx="8" class="boundary"/>
  <text x="278" y="218" class="label" fill="#CBD5E1">docker-compose.yml</text>
  <rect x="250" y="760" width="1040" height="140" rx="8" class="host"/>
  <text x="278" y="792" class="label" fill="#FEF3C7">Host workspace</text>

  <path d="M570 340 H895" stroke="#38BDF8" stroke-width="4" marker-end="url(#arrow-blue)"/>
  <text x="690" y="326" class="label" fill="#BAE6FD">HTTP render job</text>
  <path d="M570 407 Q610 470 650 440" stroke="#22C55E" stroke-width="4" marker-end="url(#arrow-green)" fill="none"/>
  <text x="592" y="473" class="label" fill="#BBF7D0">state schema</text>
  <path d="M1080 440 V518" stroke="#60A5FA" stroke-width="4" stroke-dasharray="9 7" marker-end="url(#arrow-sky)"/>
  <text x="1098" y="486" class="label" fill="#DBEAFE">TTS request</text>
  <path d="M440 795 V446" stroke="#F59E0B" stroke-width="4" marker-end="url(#arrow-amber)"/>
  <text x="454" y="620" class="label" fill="#FDE68A">read file</text>
  <path d="M740 795 Q690 610 536 446" stroke="#F59E0B" stroke-width="4" marker-end="url(#arrow-amber)" fill="none"/>
  <text x="682" y="650" class="label" fill="#FDE68A">manual import</text>
  <path d="M1050 446 V792" stroke="#F59E0B" stroke-width="4" marker-end="url(#arrow-amber)"/>
  <text x="1066" y="620" class="label" fill="#FDE68A">write output</text>

  <g filter="url(#shadow)">
    <rect x="310" y="240" width="260" height="200" rx="8" fill="#172033" stroke="#FB7185" stroke-width="3"/>
    <polygon points="346,257 386,277 386,317 346,337 306,317 306,277" fill="#EA4B71" stroke="#FB7185" stroke-width="2"/>
    <text x="410" y="275" class="card-title" fill="#FFE4E6">n8n container</text>
    <text x="335" y="322" class="card-text" fill="#FFE4E6">
      <tspan x="335" dy="0">Orchestrates workflow</tspan>
      <tspan x="335" dy="29">Reads questions file</tspan>
      <tspan x="335" dy="29">Starts / polls render</tspan>
      <tspan x="335" dy="29">Waits for human approval</tspan>
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="610" y="240" width="250" height="200" rx="8" fill="#102420" stroke="#22C55E" stroke-width="3"/>
    <ellipse cx="662" cy="274" rx="34" ry="12" fill="#12313A" stroke="#22C55E" stroke-width="2"/>
    <path d="M628 274 v44 c0 7 15 12 34 12 s34-5 34-12 v-44" fill="#12313A" stroke="#22C55E" stroke-width="2"/>
    <text x="710" y="276" class="card-title" fill="#DCFCE7">Postgres</text>
    <text x="635" y="323" class="card-text" fill="#DCFCE7">
      <tspan x="635" dy="0">Production state schema</tspan>
      <tspan x="635" dy="29">Question reservation</tspan>
      <tspan x="635" dy="29">Run / publish history</tspan>
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="900" y="240" width="310" height="200" rx="8" fill="#122033" stroke="#38BDF8" stroke-width="3"/>
    <circle cx="950" cy="294" r="28" fill="none" stroke="#38BDF8" stroke-width="4"/>
    <ellipse cx="950" cy="294" rx="48" ry="14" fill="none" stroke="#38BDF8" stroke-width="3" transform="rotate(30 950 294)"/>
    <ellipse cx="950" cy="294" rx="48" ry="14" fill="none" stroke="#38BDF8" stroke-width="3" transform="rotate(-30 950 294)"/>
    <text x="1002" y="276" class="card-title" fill="#E0F2FE">Remotion renderer</text>
    <text x="930" y="323" class="card-text" fill="#E0F2FE">
      <tspan x="930" dy="0">Validates render payload</tspan>
      <tspan x="930" dy="29">Generates Together TTS</tspan>
      <tspan x="930" dy="29">Renders MP4 via Chrome</tspan>
      <tspan x="930" dy="29">Writes artifacts / metadata</tspan>
    </text>
  </g>

  <g filter="url(#shadow)">
    <path d="M1015 555 C1016 528 1045 516 1068 530 C1081 500 1128 505 1135 537 C1164 538 1183 559 1174 584 C1169 609 1139 620 1114 612 H1032 C1008 613 991 593 998 573 C1001 563 1007 558 1015 555Z" fill="#172554" stroke="#60A5FA" stroke-width="3"/>
    <text x="1050" y="558" class="card-title" fill="#DBEAFE">Together AI API</text>
    <text x="1060" y="590" class="mono" fill="#DBEAFE">audio/speech</text>
    <text x="1060" y="615" class="mono" fill="#DBEAFE">External service</text>
  </g>

  <g filter="url(#shadow)">
    <path d="M310 808 H520 L545 833 V877 H310 Z" fill="#1E293B" stroke="#F59E0B" stroke-width="3"/>
    <text x="336" y="835" class="card-title" fill="#FEF3C7">questions.json</text>
    <text x="336" y="861" class="mono" fill="#FEF3C7">Mounted read-only into n8n</text>
    <text x="336" y="883" class="mono" fill="#FEF3C7">/files/questions.json</text>
  </g>
  <g filter="url(#shadow)">
    <path d="M610 808 H820 L845 833 V877 H610 Z" fill="#1E293B" stroke="#F59E0B" stroke-width="3"/>
    <text x="636" y="835" class="card-title" fill="#FEF3C7">n8n/workflows/*.json</text>
    <text x="636" y="864" class="mono" fill="#FEF3C7">Importable workflow contract</text>
  </g>
  <g filter="url(#shadow)">
    <path d="M910 820 H995 L1010 800 H1170 V877 H910 Z" fill="#241B35" stroke="#F59E0B" stroke-width="3"/>
    <text x="936" y="835" class="card-title" fill="#FEF3C7">data/artifacts</text>
    <text x="936" y="861" class="mono" fill="#FEF3C7">MP4, MP3, metadata</text>
    <text x="936" y="883" class="mono" fill="#FEF3C7">Browser-viewable output</text>
  </g>
</svg>
